<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>עריכת האתר — פשט״ות באב</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;800;900&family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  body { padding-top: 56px; }
  #login-screen {
    position: fixed; inset: 0; z-index: 100; background: var(--color-bg);
    display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px;
  }
  #login-screen input {
    font-family: var(--font-body); font-size: 16px; padding: 12px 16px;
    border: 1px solid var(--color-divider); border-radius: 999px; width: 240px; text-align: center;
  }
  #login-error { color: var(--color-accent-800); font-size: 13.5px; min-height: 18px; }
  #toolbar {
    position: fixed; top: 0; right: 0; left: 0; z-index: 50;
    background: var(--color-neutral-900); color: #fff; height: 56px;
    display: flex; align-items: center; gap: 12px; padding: 0 20px;
    font-family: var(--font-body); font-size: 14px;
  }
  #toolbar .spacer { flex: 1; }
  #toolbar button {
    font-family: var(--font-heading); font-weight: 700; font-size: 13.5px;
    border: none; border-radius: 999px; padding: 9px 18px; cursor: pointer;
  }
  #save-btn { background: var(--color-neutral-700); color: #fff; }
  #publish-btn { background: var(--color-accent); color: #fff; }
  #status { font-size: 13px; color: var(--color-neutral-400); }
  [data-key] { outline: 1px dashed transparent; border-radius: 4px; transition: outline-color .15s; cursor: text; }
  [data-key]:hover { outline-color: var(--color-accent-400); }
  [data-key]:focus { outline: 2px solid var(--color-accent); background: rgba(255,255,255,.5); }
  [data-img-key] { position: relative; cursor: pointer; }
  [data-img-key] .img-edit-btn {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    background: rgba(32,30,29,.45); color: #fff; font-size: 11px; text-align: center; padding: 4px;
    opacity: 0; transition: opacity .15s; border-radius: inherit;
  }
  [data-img-key]:hover .img-edit-btn { opacity: 1; }
  .w-cover[data-img-key] { min-height: 90px; background: var(--color-neutral-200); }
  .w-cover[data-img-key]:not(:has(img[src]:not([src=""]))) { display: block; margin: -22px -24px 14px; border-radius: var(--radius-lg) var(--radius-lg) 0 0; overflow: hidden; aspect-ratio: 16/9; }
</style>
</head>
<body>

<div id="login-screen">
  <h1 style="font-size:28px;margin:0">כניסת אדמין</h1>
  <input type="password" id="login-password" placeholder="סיסמה" autofocus>
  <button class="btn btn-primary" id="login-btn" style="padding:12px 28px">כניסה</button>
  <div id="login-error"></div>
</div>

<div id="toolbar" style="display:none">
  <strong>מצב עריכה</strong>
  <span id="status"></span>
  <div class="spacer"></div>
  <button id="save-btn">שמור טיוטה</button>
  <button id="publish-btn">פרסם לאתר החי 🚀</button>
</div>

<div id="stage"></div>
<input type="file" id="file-input" accept="image/*" style="display:none">

<script src="admin.js"></script>
</body>
</html>
